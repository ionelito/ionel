name: IONY
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    branches:

jobs:
  build:
    env:
      PY_COLORS: "1"
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.13"]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    # -------------------------
    # INSTALL BRAVE BROWSER
    # -------------------------
    - name: Install Brave Browser
      run: |
        sudo apt-get update
        sudo apt install -y apt-transport-https curl
        sudo curl -fsSLo /usr/share/keyrings/brave-browser-archive-keyring.gpg https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg] https://brave-browser-apt-release.s3.brave.com/ stable main" | sudo tee /etc/apt/sources.list.d/brave-browser-release.list
        sudo apt update
        sudo apt install -y brave-browser
      shell: bash

    # Verificare Brave (nu oprește workflow-ul)
    - name: Verify Brave installation
      run: |
        brave-browser --version || true
        which brave-browser || true
      shell: bash

    # -------------------------
    # INSTALL WARP
    # -------------------------
    - name: Install WARP
      run: |
        echo "Setting up Cloudflare WARP..."
        sudo apt-get -y update
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
        sudo apt-get update && sudo apt-get install -y --no-install-recommends cloudflare-warp
        sudo warp-cli --accept-tos registration new
        sudo warp-cli --accept-tos mode warp+doh
        sudo warp-cli --accept-tos connect
        sleep 5
      shell: bash

    - name: Ensure connection is WARP'ed
      run: |
        echo "Checking WARP connection..."
        curl -s https://www.cloudflare.com/cdn-cgi/trace | grep "warp=on"
      shell: bash

    # -------------------------
    # LOCALE
    # -------------------------
    - name: Set Locale
      run: |
        sudo apt-get install tzdata locales -y && sudo locale-gen en_US.UTF-8
        sudo localectl set-locale LANG="en_US.UTF-8"
        export LANG="en_US.UTF-8"
        sudo update-locale
        locale -a
        locale
        locale -c -k LC_NUMERIC
        localectl status

    # -------------------------
    # PYTHON DEPENDENCIES
    # -------------------------
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade wheel
        pip install --upgrade seleniumbase
        pip install --upgrade pyautogui
        pip install --upgrade pymongo
        pip install --upgrade python-xlib

    # -------------------------
    # INSTALL CHROMEDRIVER + BRAVEDRIVER
    # -------------------------
    - name: Install chromedriver
      run: |
        seleniumbase install chromedriver

    - name: Install BraveDriver
      run: |
        seleniumbase install chromedriver --browser=brave || true
      shell: bash

    # Verificare BraveDriver (nu oprește workflow-ul)
    - name: Verify BraveDriver
      run: |
        ls -l ~/.seleniumbase/drivers || true
      shell: bash

    # -------------------------
    # RUN SCRIPT
    # -------------------------
    - name: Run python ion.py --debug
      run: |
        python ion.py --brave --incognito --do-not-track --xvfb --screenshot
